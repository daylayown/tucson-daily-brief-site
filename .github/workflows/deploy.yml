name: Deploy static site to Pages

# Publishes the repo root to GitHub Pages. Replaces GitHub's built-in
# "Deploy from a branch" flow so we can add retry logic around the deploy
# step — GitHub's Pages backend has intermittently rejected/stalled
# deployments (July 2026), and the managed flow has no retry.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Least-privilege token scopes required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deploy; queue the next one behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Use whichever deploy attempt succeeded (first non-empty page_url).
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Static site — no build step. .nojekyll at the root skips Jekyll,
      # and the CNAME file carries the custom domain into the artifact.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # --- Deploy with up to 3 attempts + backoff ---------------------
      # GitHub's Pages backend occasionally returns "Deployment failed,
      # try again later." or leaves a deploy stuck queued. Each attempt
      # fails fast (5-min cap) and we retry with increasing backoff.
      # Only the final attempt is fatal, so a transient hiccup self-heals.

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000

      - name: Backoff before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000

      - name: Backoff before attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000
