# Fly.io config for the Ask Tucson Daily Brief RAG service.
# Stage 1 of the "move TDB off the laptop" roadmap. Single small machine,
# index.sqlite baked into the image (see Dockerfile).
app = "tdb-ask"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to keep costs near nothing during shakedown.
  # Flip min_machines_running to 1 at public launch to avoid cold-start latency.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
